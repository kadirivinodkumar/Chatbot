<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --accent: #7c6aff;
      --accent2: #4fd9ff;
      --accent-glow: rgba(124, 106, 255, 0.35);
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --text-dim: #3a3a4a;
      --user-bubble: #1e1b3a;
      --ai-bubble: #111118;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(124,106,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 10% 90%, rgba(79,217,255,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── LAYOUT ── */
    .shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(10,10,15,0.7);
      position: relative;
    }

    .logo-ring {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 18px var(--accent-glow);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 18px var(--accent-glow); }
      50% { box-shadow: 0 0 32px rgba(124,106,255,0.55), 0 0 60px rgba(79,217,255,0.2); }
    }

    .logo-ring svg { width: 18px; height: 18px; fill: #fff; }

    .header-text { flex: 1; }

    .header-text h1 {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .header-text span {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 16px;
      animation: fade-up 0.6s ease both;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px var(--accent-glow);
      margin-bottom: 8px;
    }

    .welcome-icon svg { width: 30px; height: 30px; fill: #fff; }

    .welcome h2 {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 13px;
      max-width: 320px;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-bright);
      background: var(--surface2);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(124,106,255,0.1);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 12px;
      animation: fade-up 0.35s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
    }

    .message.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 12px var(--accent-glow);
      font-family: var(--font-head);
      color: #fff;
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .message.user .avatar {
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      color: var(--text-muted);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(124,106,255,0.25);
      border-top-right-radius: 4px;
      color: #d4d0ff;
    }

    .bubble-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 5px;
      letter-spacing: 0.3px;
    }

    .message.user .bubble-meta { text-align: right; }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; background: color-mix(in srgb, var(--accent) 60%, var(--accent2)); }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; background: var(--accent2); }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 0 28px;
    }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 16px 28px 22px;
      background: rgba(10,10,15,0.7);
      backdrop-filter: blur(12px);
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 14px;
      padding: 10px 12px 10px 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-box:focus-within {
      border-color: rgba(124,106,255,0.5);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.1), 0 0 20px rgba(124,106,255,0.08);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 22px;
    }

    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #5c4dff);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    #send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    #send-btn:active { transform: translateY(0); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #send-btn svg { width: 15px; height: 15px; fill: #fff; }

    .input-hint {
      text-align: center;
      font-size: 10.5px;
      color: var(--text-dim);
      margin-top: 9px;
      letter-spacing: 0.3px;
    }

    .input-hint kbd {
      font-family: var(--font-mono);
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
    }

    /* ── SCROLLED HEADER SHADOW ── */
    header.shadowed { box-shadow: 0 1px 30px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <header id="header">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <div class="header-text">
      <h1>Gemini Chat</h1>
      <span>powered by gemini-2.5-flash</span>
    </div>
    <div class="status-dot">online</div>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </div>
      <h2>Ask me anything</h2>
      <p>Powered by Google Gemini 2.5 Flash — fast, accurate, and ready to help.</p>
      <div class="suggestion-chips">
        <div class="chip" onclick="useChip(this)">Explain quantum computing</div>
        <div class="chip" onclick="useChip(this)">Write a Python function</div>
        <div class="chip" onclick="useChip(this)">Summarise a topic</div>
        <div class="chip" onclick="useChip(this)">Help me brainstorm</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Send a message…"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" title="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</p>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const welcomeEl  = document.getElementById('welcome');
  const headerEl   = document.getElementById('header');

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Header shadow on scroll
  messagesEl.addEventListener('scroll', () => {
    headerEl.classList.toggle('shadowed', messagesEl.scrollTop > 8);
  });

  // Keyboard shortcut
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function useChip(el) {
    inputEl.value = el.textContent;
    inputEl.focus();
    inputEl.dispatchEvent(new Event('input'));
  }

  function formatTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    // Hide welcome
    if (welcomeEl) welcomeEl.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'ai' ? 'AI' : '✦';

    const right = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    meta.textContent = formatTime();

    right.appendChild(bubble);
    right.appendChild(meta);

    wrap.appendChild(avatar);
    wrap.appendChild(right);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    if (welcomeEl) welcomeEl.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'message ai';
    wrap.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      removeTyping();
      appendMessage('ai', data.reply || 'No response received.');
    } catch (err) {
      removeTyping();
      appendMessage('ai', '⚠ Could not connect to the server. Make sure Flask is running on port 2005.');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>

</body>
</html>
